<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>piksel piksel 3D — damalı oda</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: #0c0e12; color: #cfd3da; font: 14px/1.45 system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 10px; gap: 10px;
  }
  header, #stage, #hint, #err { width: 100%; max-width: 640px; }
  header { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  h1 { font-size: 15px; font-weight: 600; color: #fff; margin-right: auto; }
  .grp { display: flex; gap: 4px; align-items: center; }
  button {
    background: #1c2129; color: #cfd3da; border: 1px solid #2c333e;
    border-radius: 7px; padding: 5px 11px; font: inherit; cursor: pointer;
    touch-action: manipulation;
  }
  button.on { background: #2d4a76; border-color: #4878b8; color: #fff; }
  #fps { min-width: 64px; text-align: right; font-variant-numeric: tabular-nums; color: #8a93a0; }
  #stage { position: relative; }
  canvas {
    display: block; width: 100%; aspect-ratio: 1 / 1;
    image-rendering: pixelated; border-radius: 10px; background: #000;
    touch-action: none; cursor: grab;
  }
  canvas:active { cursor: grabbing; }
  #hint { color: #717a87; font-size: 12.5px; text-align: center; }
  #err {
    display: none; background: #3a1c1c; border: 1px solid #6e2c2c;
    color: #ffb0b0; border-radius: 9px; padding: 10px 14px;
  }
</style>
</head>
<body>

<header>
  <h1>piksel piksel 3D <span style="color:#5b89c9">· damalı oda</span></h1>
  <div class="grp">
    <span style="color:#717a87">kalite</span>
    <button data-q="1">1</button>
    <button data-q="2">2</button>
    <button data-q="3">3</button>
    <button id="autoQ" class="on">oto</button>
  </div>
  <button id="animBtn" class="on">animasyon</button>
  <span id="fps">—</span>
</header>

<div id="stage">
  <canvas id="cv"></canvas>
</div>

<p id="hint">Kamera sabit — <b>sürükleyerek etrafına bak</b> · damalı oda, üç yansıtıcı küre ·
ok tuşlarıyla da bakabilirsin · Boşluk: animasyon · 1/2/3: kalite</p>

<div id="err"></div>

(async () => {
  const $ = s => document.querySelector(s);
  const err = m => { const e = $('#err'); e.style.display = 'block'; e.textContent = m; };

  // ---- gömülü wasm'ı çöz ve başlat ----
  let ex;
  try {
    const bayt = Uint8Array.from(atob(WASM_B64), c => c.charCodeAt(0));
    ex = (await WebAssembly.instantiate(bayt, {})).instance.exports;
  } catch (e) { return err('WASM başlatılamadı: ' + e.message); }

  // ---- tuval ----
  const W = ex.fb_w(), H = ex.fb_h(), fbp = ex.fb_ptr();
  const cv = $('#cv'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const img = ctx.createImageData(W, H);

  // ---- girdi: klavye (sadece bakış — hareket yok) ----
  // bitler: 64-512 → bakış (ok tuşları)
  let keys = 0;
  const map = { ArrowLeft:64, ArrowRight:128, ArrowUp:256, ArrowDown:512 };
  addEventListener('keydown', e => {
    if (e.code in map) { keys |= map[e.code]; e.preventDefault(); }
    else if (e.code === 'Space') { setAnim(ex.toggle_anim()); e.preventDefault(); }
    else if (e.code >= 'Digit1' && e.code <= 'Digit3') setQ(+e.code.slice(-1), false);
  });
  addEventListener('keyup', e => { if (e.code in map) keys &= ~map[e.code]; });

  // ---- girdi: fare + dokunmatik sürükleme → etrafına bak ----
  let dragId = null, lx = 0, ly = 0;
  cv.addEventListener('pointerdown', e => {
    dragId = e.pointerId; lx = e.clientX; ly = e.clientY;
    cv.setPointerCapture(dragId);
    e.preventDefault();
  });
  cv.addEventListener('pointermove', e => {
    if (e.pointerId !== dragId) return;
    const olcek = W / cv.getBoundingClientRect().width;    // CSS ölçeğini telafi et
    ex.drag((e.clientX - lx) * olcek, (e.clientY - ly) * olcek);
    lx = e.clientX; ly = e.clientY;
  });
  const birak = e => { if (e.pointerId === dragId) dragId = null; };
  cv.addEventListener('pointerup', birak);
  cv.addEventListener('pointercancel', birak);

  // ---- kalite & animasyon düğmeleri ----
  let autoQ = true;
  const qBtns = [...document.querySelectorAll('[data-q]')];
  function setQ(q, oto) {
    ex.set_quality(q); autoQ = oto;
    qBtns.forEach(b => b.classList.toggle('on', +b.dataset.q === ex.get_quality() && !oto));
    $('#autoQ').classList.toggle('on', oto);
  }
  qBtns.forEach(b => b.onclick = () => setQ(+b.dataset.q, false));
  $('#autoQ').onclick = () => setQ(ex.get_quality(), true);

  function setAnim(a) { $('#animBtn').classList.toggle('on', !!a); }
  $('#animBtn').onclick = () => setAnim(ex.toggle_anim());

  // dokunmatikte düşük kaliteyle başla; "oto" gerisini ayarlar
  setQ(matchMedia('(pointer: coarse)').matches ? 3 : 2, true);

  // ---- ana döngü ----
  let son = performance.now(), topla = 0, n = 0;
  function dongu(t) {
    const dt = Math.min((t - son) / 1000, 0.05); son = t;

    ex.frame(dt, keys);                                    // ← tüm pikseller burada hesaplanır
    img.data.set(new Uint8ClampedArray(ex.memory.buffer, fbp, W * H * 4));
    ctx.putImageData(img, 0, 0);

    topla += dt; n++;
    if (topla >= 0.5) {                                    // FPS + otomatik kalite
      const fps = n / topla;
      $('#fps').textContent = fps.toFixed(0) + ' FPS';
      if (autoQ) {
        const q = ex.get_quality();
        if (fps < 24 && q < 4) ex.set_quality(q + 1);
        else if (fps > 55 && q > 1) ex.set_quality(q - 1);
      }
      topla = 0; n = 0;
    }
    requestAnimationFrame(dongu);
  }
  requestAnimationFrame(dongu);
})();
</script>
</body>
</html>
