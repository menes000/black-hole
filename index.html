(async () => {
  const $ = s => document.querySelector(s);
  const err = m => { const e = $('#err'); e.style.display = 'block'; e.textContent = m; };

  // ---- decode and instantiate embedded wasm ----
  let ex;
  try {
    const bytes = Uint8Array.from(atob(WASM_B64), c => c.charCodeAt(0));
    ex = (await WebAssembly.instantiate(bytes, {})).instance.exports;
  } catch (e) { return err('WASM init failed: ' + e.message); }

  // ---- canvas ----
  const W = ex.fb_w(), H = ex.fb_h(), fbp = ex.fb_ptr();
  const cv = $('#cv'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const img = ctx.createImageData(W, H);

  // ---- input: keyboard (look only — no movement) ----
  // bits: 64-512 → look (arrow keys)
  let keys = 0;
  const map = { ArrowLeft:64, ArrowRight:128, ArrowUp:256, ArrowDown:512 };
  addEventListener('keydown', e => {
    if (e.code in map) { keys |= map[e.code]; e.preventDefault(); }
    else if (e.code === 'Space') { setAnim(ex.toggle_anim()); e.preventDefault(); }
    else if (e.code >= 'Digit1' && e.code <= 'Digit3') setQ(+e.code.slice(-1), false);
  });
  addEventListener('keyup', e => { if (e.code in map) keys &= ~map[e.code]; });

  // ---- input: drag → look around · stationary click → launch object ----
  let dragId = null, lx = 0, ly = 0, sx = 0, sy = 0, moved = false;
  cv.addEventListener('pointerdown', e => {
    dragId = e.pointerId; lx = sx = e.clientX; ly = sy = e.clientY; moved = false;
    cv.setPointerCapture(dragId);
    e.preventDefault();
  });
  cv.addEventListener('pointermove', e => {
    if (e.pointerId !== dragId) return;
    if (!moved && Math.hypot(e.clientX - sx, e.clientY - sy) <= 6) return; // click threshold
    moved = true;
    const scale = W / cv.getBoundingClientRect().width;    // compensate for CSS scaling
    ex.drag((e.clientX - lx) * scale, (e.clientY - ly) * scale);
    lx = e.clientX; ly = e.clientY;
  });
  cv.addEventListener('pointerup', e => {
    if (e.pointerId !== dragId) return;
    if (!moved) {                                          // no movement → launch
      const r = cv.getBoundingClientRect();
      ex.spawn((e.clientX - r.left) * W / r.width, (e.clientY - r.top) * H / r.height);
    }
    dragId = null;
  });
  cv.addEventListener('pointercancel', e => { if (e.pointerId === dragId) dragId = null; });

  // ---- quality & animation buttons ----
  let autoQ = true;
  const qBtns = [...document.querySelectorAll('[data-q]')];
  function setQ(q, isAuto) {
    ex.set_quality(q); autoQ = isAuto;
    qBtns.forEach(b => b.classList.toggle('on', +b.dataset.q === ex.get_quality() && !isAuto));
    $('#autoQ').classList.toggle('on', isAuto);
  }
  qBtns.forEach(b => b.onclick = () => setQ(+b.dataset.q, false));
  $('#autoQ').onclick = () => setQ(ex.get_quality(), true);

  function setAnim(a) { $('#animBtn').classList.toggle('on', !!a); }
  $('#animBtn').onclick = () => setAnim(ex.toggle_anim());

  // start at low quality on touchscreens; "auto" adjusts the rest
  setQ(matchMedia('(pointer: coarse)').matches ? 3 : 2, true);

  // ---- main loop ----
  let last = performance.now(), accum = 0, n = 0;
  function loop(t) {
    const dt = Math.min((t - last) / 1000, 0.05); last = t;

    ex.frame(dt, keys);                                    // ← all pixels computed here
    img.data.set(new Uint8ClampedArray(ex.memory.buffer, fbp, W * H * 4));
    ctx.putImageData(img, 0, 0);

    accum += dt; n++;
    if (accum >= 0.5) {                                    // FPS + auto quality
      const fps = n / accum;
      $('#fps').textContent = fps.toFixed(0) + ' FPS';
      if (autoQ) {
        const q = ex.get_quality();
        if (fps < 24 && q < 4) ex.set_quality(q + 1);
        else if (fps > 55 && q > 1) ex.set_quality(q - 1);
      }
      accum = 0; n = 0;
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
