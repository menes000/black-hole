(async () => {
  const $ = s => document.querySelector(s);
  const err = m => { const e = $('#err'); e.style.display = 'block'; e.textContent = m; };

  // ---- gömülü wasm'ı çöz ve başlat ----
  let ex;
  try {
    const bayt = Uint8Array.from(atob(WASM_B64), c => c.charCodeAt(0));
    ex = (await WebAssembly.instantiate(bayt, {})).instance.exports;
  } catch (e) { return err('WASM başlatılamadı: ' + e.message); }

  // ---- tuval ----
  const W = ex.fb_w(), H = ex.fb_h(), fbp = ex.fb_ptr();
  const cv = $('#cv'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const img = ctx.createImageData(W, H);

  // ---- girdi: klavye (sadece bakış — hareket yok) ----
  // bitler: 64-512 → bakış (ok tuşları)
  let keys = 0;
  const map = { ArrowLeft:64, ArrowRight:128, ArrowUp:256, ArrowDown:512 };
  addEventListener('keydown', e => {
    if (e.code in map) { keys |= map[e.code]; e.preventDefault(); }
    else if (e.code === 'Space') { setAnim(ex.toggle_anim()); e.preventDefault(); }
    else if (e.code >= 'Digit1' && e.code <= 'Digit3') setQ(+e.code.slice(-1), false);
  });
  addEventListener('keyup', e => { if (e.code in map) keys &= ~map[e.code]; });

  // ---- girdi: sürükleme → etrafına bak · hareketsiz tıklama → cisim fırlat ----
  let dragId = null, lx = 0, ly = 0, sx = 0, sy = 0, moved = false;
  cv.addEventListener('pointerdown', e => {
    dragId = e.pointerId; lx = sx = e.clientX; ly = sy = e.clientY; moved = false;
    cv.setPointerCapture(dragId);
    e.preventDefault();
  });
  cv.addEventListener('pointermove', e => {
    if (e.pointerId !== dragId) return;
    if (!moved && Math.hypot(e.clientX - sx, e.clientY - sy) <= 6) return; // tıklama eşiği
    moved = true;
    const olcek = W / cv.getBoundingClientRect().width;    // CSS ölçeğini telafi et
    ex.drag((e.clientX - lx) * olcek, (e.clientY - ly) * olcek);
    lx = e.clientX; ly = e.clientY;
  });
  cv.addEventListener('pointerup', e => {
    if (e.pointerId !== dragId) return;
    if (!moved) {                                          // hareket yok → fırlat
      const r = cv.getBoundingClientRect();
      ex.spawn((e.clientX - r.left) * W / r.width, (e.clientY - r.top) * H / r.height);
    }
    dragId = null;
  });
  cv.addEventListener('pointercancel', e => { if (e.pointerId === dragId) dragId = null; });

  // ---- kalite & animasyon düğmeleri ----
  let autoQ = true;
  const qBtns = [...document.querySelectorAll('[data-q]')];
  function setQ(q, oto) {
    ex.set_quality(q); autoQ = oto;
    qBtns.forEach(b => b.classList.toggle('on', +b.dataset.q === ex.get_quality() && !oto));
    $('#autoQ').classList.toggle('on', oto);
  }
  qBtns.forEach(b => b.onclick = () => setQ(+b.dataset.q, false));
  $('#autoQ').onclick = () => setQ(ex.get_quality(), true);

  function setAnim(a) { $('#animBtn').classList.toggle('on', !!a); }
  $('#animBtn').onclick = () => setAnim(ex.toggle_anim());

  // dokunmatikte düşük kaliteyle başla; "oto" gerisini ayarlar
  setQ(matchMedia('(pointer: coarse)').matches ? 3 : 2, true);

  // ---- ana döngü ----
  let son = performance.now(), topla = 0, n = 0;
  function dongu(t) {
    const dt = Math.min((t - son) / 1000, 0.05); son = t;

    ex.frame(dt, keys);                                    // ← tüm pikseller burada hesaplanır
    img.data.set(new Uint8ClampedArray(ex.memory.buffer, fbp, W * H * 4));
    ctx.putImageData(img, 0, 0);

    topla += dt; n++;
    if (topla >= 0.5) {                                    // FPS + otomatik kalite
      const fps = n / topla;
      $('#fps').textContent = fps.toFixed(0) + ' FPS';
      if (autoQ) {
        const q = ex.get_quality();
        if (fps < 24 && q < 4) ex.set_quality(q + 1);
        else if (fps > 55 && q > 1) ex.set_quality(q - 1);
      }
      topla = 0; n = 0;
    }
    requestAnimationFrame(dongu);
  }
  requestAnimationFrame(dongu);
})();
</script>
